<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOC System Monitor</title>

<style>

body{
background:#0b0f1a;
font-family:Segoe UI,Arial;
color:white;
margin:0;
padding:30px;
}

h1{
text-align:center;
color:#00eaff;
margin-bottom:40px;
}

.container{
max-width:900px;
margin:auto;
}

.site{
background:#111827;
border:1px solid #1f2937;
padding:18px;
margin-bottom:12px;
border-radius:8px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.name{
font-size:16px;
font-weight:bold;
}

.status{
font-weight:bold;
}

.up{
color:#00ff9c;
}

.down{
color:#ff4c4c;
}

.latency{
font-size:13px;
color:#9ca3af;
margin-top:6px;
}

.bar{
height:6px;
background:#1f2937;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}

.bar span{
display:block;
height:6px;
background:#00eaff;
width:0%;
}

.footer{
text-align:center;
margin-top:30px;
color:#9ca3af;
font-size:12px;
}

@media(max-width:700px){

.row{
flex-direction:column;
align-items:flex-start;
gap:6px;
}

}

</style>

</head>

<body>

<h1>NOC System Monitoring</h1>

<div class="container" id="monitor"></div>

<div class="footer">
Update Interval 5 sec.
</div>

<script>

const sites=[

{name:"app.bayurizki.my.id",url:"https://app.bayurizki.my.id"},
{name:"google.com",url:"https://google.com"},
{name:"botdev72.github.io",url:"https://botdev72.github.io"},
{name:"brztech.my.id",url:"http://brztech.my.id"},
{name:"brzfams.web-id.id",url:"http://brzfams.web-id.id"}

];

async function checkSite(site){

let start=performance.now();

try{

let controller=new AbortController();
let timeout=setTimeout(()=>controller.abort(),5000);

await fetch(site.url,{mode:"no-cors",signal:controller.signal});

clearTimeout(timeout);

let latency=Math.round(performance.now()-start);

return{up:true,latency};

}catch{

return{up:false,latency:null};

}

}


async function run(){

let container=document.getElementById("monitor");
container.innerHTML="";

for(let site of sites){

let result=await checkSite(site);

let status=result.up?"UP":"DOWN";
let statusClass=result.up?"up":"down";
let latency=result.latency?result.latency+" ms":"timeout";

let barWidth=result.latency?Math.min(result.latency/3,100):0;

let div=document.createElement("div");

div.className="site";

div.innerHTML=`

<div class="row">

<div class="name">${site.name}</div>

<div class="status ${statusClass}">
[ ${status} ]
</div>

</div>

<div class="latency">
Latency: ${latency}
</div>

<div class="bar">
<span style="width:${barWidth}%"></span>
</div>

`;

container.appendChild(div);

}

}

run();
setInterval(run,5000);

</script>

</body>

</html>
